name: Release

# MANUAL ONLY. This workflow never runs automatically — it must be triggered
# from the Actions tab (workflow_dispatch). Publishing is NOT enabled until you:
#   1. choose a package + version below,
#   2. add the required secrets (NPM_TOKEN, PYPI_API_TOKEN, PHP_SPLIT_DEPLOY_KEY),
#   3. set vars.PUBLISH_ENABLED to "true" (a deliberate safety gate).
# Until PUBLISH_ENABLED is "true", every job runs in dry-run mode and uploads
# nothing.

on:
  workflow_dispatch:
    inputs:
      package:
        description: Which package to release
        required: true
        type: choice
        options: [js, python, php]
      version:
        description: Version to publish (e.g. 1.0.0)
        required: true
        type: string

jobs:
  publish-js:
    if: ${{ inputs.package == 'js' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: node conformance/run.cjs
      - name: Publish @nais-standard/sdk
        working-directory: js
        run: |
          npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version
          if [ "${{ vars.PUBLISH_ENABLED }}" = "true" ]; then
            npm publish --access public
          else
            echo "PUBLISH_ENABLED != true — dry run"; npm publish --dry-run --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    if: ${{ inputs.package == 'python' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install cryptography build twine
      - run: python conformance/run.py
      - name: Build nais-sdk
        working-directory: python
        run: python -m build
      - name: Publish to PyPI
        working-directory: python
        run: |
          if [ "${{ vars.PUBLISH_ENABLED }}" = "true" ]; then
            twine upload dist/*
          else
            echo "PUBLISH_ENABLED != true — skipping upload"; twine check dist/*
          fi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-php:
    if: ${{ inputs.package == 'php' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: sodium, curl, json
      - run: php conformance/run.php
      # Packagist can't install a subdirectory, so we split php/ into a
      # read-only single-package mirror repo that Packagist watches.
      - name: Install splitsh-lite
        run: |
          curl -sSL https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz \
            | tar -xz && sudo mv splitsh-lite /usr/local/bin/
      # Materialize the deploy key (only when actually publishing) so the push below
      # can authenticate to the mirror over SSH. GITHUB masks the secret in logs.
      - name: Install deploy key
        if: ${{ vars.PUBLISH_ENABLED == 'true' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PHP_SPLIT_DEPLOY_KEY }}" > /tmp/php_deploy_key
          chmod 600 /tmp/php_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
      - name: Split php/ and push to mirror
        run: |
          SHA=$(splitsh-lite --prefix=php)
          echo "split sha: $SHA"
          if [ "${{ vars.PUBLISH_ENABLED }}" = "true" ]; then
            git remote add mirror git@github.com:nais-standard/nais-php.git
            git push mirror "$SHA:refs/heads/main" --force
            git tag "${{ inputs.version }}" "$SHA"
            git push mirror "${{ inputs.version }}"
          else
            echo "PUBLISH_ENABLED != true — split computed but nothing pushed"
          fi
        env:
          # SSH deploy key with write access to the nais-php mirror repo.
          GIT_SSH_COMMAND: ssh -i /tmp/php_deploy_key
